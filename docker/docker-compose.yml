services:
  postgres:
    image: postgres:16
    container_name: tf-postgres
    environment:
      POSTGRES_USER: tf
      POSTGRES_PASSWORD: tfpass
      POSTGRES_DB: thaiflux
    ports: [ "5432:5432" ]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tf -d thaiflux"]
      interval: 5s
      timeout: 3s
      retries: 30

  cassandra:
    image: cassandra:4.1
    container_name: tf-cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=thaiflux
      - JVM_OPTS=-Xms512m -Xmx512m
    ports: [ "9042:9042" ]
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 10s
      timeout: 5s
      retries: 60

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: tf-zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports: [ "2181:2181" ]

  kafka:
    image: bitnami/kafka:3.7
    container_name: tf-kafka
    ports: [ "9092:9092" ]
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@tf-kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper   # Bitnami image still expects ZK by default modes

volumes:
  pgdata:
