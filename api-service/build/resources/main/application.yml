server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/thaiflux
    username: tf
    password: tfpass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false

  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info
